<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.querySelectorAll('a[href^="http"]').forEach(function(link) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    });
  });
</script>

<!-- Academicons: used for the Google Scholar icon in the author sidebar (not in Font Awesome's free set) -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1/css/academicons.min.css"></noscript>
